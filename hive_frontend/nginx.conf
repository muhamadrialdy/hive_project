server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets — helps the JS bundle and SVGs
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API calls to the backend container. Both services share the compose
    # network so "backend" resolves to the FastAPI service.
    location /api/ {
        proxy_pass         http://backend:8088;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # LLM responses can take a while
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Embedded VitePress docs site — already pre-built into public/docs by the
    # frontend build. nginx serves them as plain static files.
    location /docs/ {
        try_files $uri $uri/ /docs/index.html;
    }

    # SPA fallback — everything else gets index.html so React Router can route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
